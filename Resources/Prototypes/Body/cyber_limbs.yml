# Civilian variants - roundstart (6 arm / 4 leg slots)
# Box2i format: left, bottom, right, top (inclusive). 6 slots = 2x3 = 0,0,1,2
- type: entity
  parent: OrganCyberArmLeftBase
  id: OrganCyberArmLeft
  name: left cyber arm
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,2

- type: entity
