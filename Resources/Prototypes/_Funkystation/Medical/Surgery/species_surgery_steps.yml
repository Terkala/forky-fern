# Body part surgery step configs per species and organ category.
# Uses OrganCategoryPrototype (Torso, ArmLeft, etc.).
# When steps are the same as Human, configs are omitted - the system falls back to Human.
# See commented template at end for enabling species/limb-specific procedures.

# === Human (canonical - all other species fall back to this when no config exists) ===

- type: bodyPartSurgerySteps
  id: HumanTorso
  species: Human
  organCategory: Torso
  skinOpenStepEntries:
    - procedure: CreateIncision
      primaryTag: CuttingTool
      improvisedDamageType: Slash
    - procedure: ClampVessels
      primaryTag: ManipulatingTool
      improvisedTag: Wirecutter
    - procedure: RetractSkin
      primaryTag: PryingTool
      improvisedDamageType: Blunt
  skinCloseStepEntries:
    - procedure: ReleaseRetractor
      primaryTag: PryingTool
      improvisedDamageType: Blunt
    - procedure: ReconnectVessels
      primaryTag: HemostatTool
      improvisedTag: AnchoringTool
    - procedure: SealSkin
      primaryTag: HeatWeapon
      improvisedDamageType: Heat
  tissueOpenStepEntries:
    - procedure: CutBone
      primaryTag: SawingTool
      improvisedDamageType: Blunt
    - procedure: MarrowBleeding
      primaryTag: HeatWeapon
      improvisedDamageType: Heat
    - procedure: RetractTissue
      primaryTag: PryingTool
      improvisedDamageType: Blunt
  tissueCloseStepEntries:
    - procedure: MaintainAlignment
      primaryTag: ManipulatingTool
      improvisedTag: Screwdriver
    - procedure: SealBleedPoints
      primaryTag: HeatWeapon
      improvisedDamageType: Heat
    - procedure: RepairBoneSection
      primaryTag: BoneGelTool
  organSteps: [InsertOrgan]

