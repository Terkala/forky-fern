      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceHuman
  name: human appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganHumanTorso
        - id: OrganHumanHead
        - id: OrganHumanArmLeft
        - id: OrganHumanArmRight
        - id: OrganHumanLegLeft
        - id: OrganHumanLegRight
  - type: HumanoidProfile
    species: Human

- type: entity
  parent:
  - AppearanceHuman
  - BaseSpeciesMobOrganic
  id: MobHuman
  name: Urist McHands
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman
      amount: 5

- type: entity
  parent: OrganBase
  id: OrganHuman
  abstract: true
  suffix: human

- type: entity
  id: OrganHumanMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human ]

- type: entity
  parent: OrganHuman
  id: OrganHumanInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: OrganHuman
  id: OrganHumanExternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Human

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganHumanExternal ]
  id: OrganHumanTorso
  components:
  - type: BodyPart
    containerId: internal_organs
    slots: [ Lungs, Heart, Stomach, Liver, Kidneys, Appendix ]
  - type: SurgeryLayer
  - type: ContainerContainer
    containers:
      internal_organs: !type:Container
        showEnts: False
        occludes: True
        ents: []
  - type: EntityTableContainerFill
    containers:
      internal_organs: !type:AllSelector
        children:
        - id: OrganHumanLungs
        - id: OrganHumanHeart
        - id: OrganHumanStomach
        - id: OrganHumanLiver
        - id: OrganHumanKidneys
        - id: OrganHumanAppendix

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganHumanExternal ]
  id: OrganHumanHead
  components:
  - type: BodyPart
    containerId: head_organs
    slots: [ Brain, Eyes, Tongue, Ears ]
  - type: SurgeryLayer
  - type: ContainerContainer
    containers:
      head_organs: !type:Container
        showEnts: False
        occludes: True
        ents: []
  - type: EntityTableContainerFill
    containers:
      head_organs: !type:AllSelector
        children:
        - id: OrganHumanBrain
        - id: OrganHumanEyes
        - id: OrganHumanTongue
        - id: OrganHumanEars
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

