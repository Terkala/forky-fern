# Pre-filled cyber limbs for CyberSurgery crate - come with capacitor, modular machine part, medium battery, and matter bin
- type: entity
  parent: OrganCyberArmLeft
  id: OrganCyberArmLeftPreFilled
  name: left cyber arm
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,4,1
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CapacitorStockPart
        - id: MicroManipulatorStockPart
        - id: PowerCellMedium
        - id: MatterBinStockPart

