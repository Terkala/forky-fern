# Base abstracts for cyber arms and legs
- type: entity
  abstract: true
  parent: OrganBaseArmLeft
  id: OrganCyberArmLeftBase
  name: left cyber arm
  components:
  - type: HandOrgan
    handID: left
    data:
      location: Left
  - type: Sprite
    sprite: _EinsteinEngines/Mobs/Species/Cybernetics/bishop/bishop_main.rsi
    state: l_arm-combined-hand
  - type: Organ
    category: ArmLeft
    integrityCost: 1
  - type: BodyPart
    containerId: limb_organs
    slots: []
  - type: CyberLimb
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.CyberArmSelectUiKey.Key:
        type: CyberArmSelectMenuBoundUserInterface

